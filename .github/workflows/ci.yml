name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: i18n + tests + tsc
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: i18n parity
        run: npm run i18n:audit

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit
